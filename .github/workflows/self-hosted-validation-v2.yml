name: Defender CLI v2 self-hosted validation
on: push

permissions:
  id-token: write
  security-events: write

jobs:
  # === Existing scan jobs ===

  defender-image-scan:
    name: Image Scan (mdc policy)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Image Scan
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'ubuntu:latest'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  defender-model-scan:
    name: Model Scan (clean - Qwen)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Model Scan
      uses: ./v2/
      id: defender
      with:
        command: 'model'
        modelPath: 'https://huggingface.co/Qwen/Qwen3.5-35B-A3B'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'true'

  defender-model-scan-vuln:
    name: Model Scan (vulnerable - bert-tiny-torch-vuln)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Model Scan (bert-tiny-torch-vuln)
      uses: ./v2/
      id: defender
      with:
        command: 'model'
        modelPath: 'https://huggingface.co/drhyrum/bert-tiny-torch-vuln'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'true'

  defender-fs-scan:
    name: FS Scan (azuredevops policy)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Filesystem Scan
      uses: ./v2/
      id: defender
      with:
        command: 'fs'
        policy: 'azuredevops'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === Policy variations ===

  fs-policy-github:
    name: FS Scan (github policy - default)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - FS with github policy
      uses: ./v2/
      id: defender
      with:
        command: 'fs'
        policy: 'github'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  fs-policy-microsoft:
    name: FS Scan (microsoft policy)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - FS with microsoft policy
      uses: ./v2/
      id: defender
      with:
        command: 'fs'
        policy: 'microsoft'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  fs-policy-none:
    name: FS Scan (no policy)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - FS with no policy
      uses: ./v2/
      id: defender
      with:
        command: 'fs'
        policy: 'none'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === Break on critical ===

  image-break-vuln:
    name: Image Scan (break=true, vulnerable image)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Image with break (should fail)
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'pycontribs/ubuntu:latest'
        policy: 'mdc'
        break: 'true'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  model-break-vuln:
    name: Model Scan (break=true, vulnerable model)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Model with break (should fail)
      uses: ./v2/
      id: defender
      with:
        command: 'model'
        modelPath: 'https://huggingface.co/drhyrum/bert-tiny-torch-vuln'
        policy: 'mdc'
        break: 'true'
        pr-summary: 'true'

  fs-break:
    name: FS Scan (break=true)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - FS with break
      uses: ./v2/
      id: defender
      with:
        command: 'fs'
        policy: 'github'
        break: 'true'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === Debug logging ===

  image-debug:
    name: Image Scan (debug=true)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Image with debug
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'ubuntu:latest'
        policy: 'mdc'
        break: 'false'
        debug: 'true'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === PR summary toggle ===

  image-no-summary:
    name: Image Scan (pr-summary=false)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Image without summary
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'ubuntu:latest'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'false'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === Custom args ===

  image-custom-args:
    name: Image Scan (custom args --defender-list-findings)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - Image with custom args
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'ubuntu:latest'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'true'
        args: '--defender-list-findings'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === Different images ===

  image-nginx:
    name: Image Scan (nginx)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - nginx image
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'nginx:latest'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  image-vuln:
    name: Image Scan (vulnerable - pycontribs/ubuntu)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - vulnerable image
      uses: ./v2/
      id: defender
      with:
        command: 'image'
        imageName: 'pycontribs/ubuntu:latest'
        policy: 'mdc'
        break: 'false'
        pr-summary: 'true'

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}

  # === Defaults only ===

  defaults-only:
    name: Defaults Only (no inputs)

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v6

    - name: Run Defender CLI - defaults
      uses: ./v2/
      id: defender

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.defender.outputs.sarifFile }}
